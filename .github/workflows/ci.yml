name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1: Backend tester
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: backend
      - run: npm test
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  # JOB 2: Frontend tester
  frontend-test:
    runs-on: ubuntu-latest
    needs: backend-test 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: frontend
      - run: npx playwright install --with-deps
      - run: npm run build
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  # JOB 3: E2E tester (kräver att backend + frontend körs)
  e2e-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
     
      # Installera beroenden
      - run: npm install
        working-directory: backend
      - run: npm install
        working-directory: frontend
     
      # Installera Playwright
      - run: npx playwright install --with-deps
        working-directory: frontend
     
      # Starta backend
      - run: npm run dev &
        working-directory: backend
     
      # Starta frontend
      - run: npm run dev &
        working-directory: frontend
     
      # Vänta på frontend
      - run: npx wait-on http://localhost:5173
        working-directory: frontend
     
      # Kör E2E tester
      - run: npx playwright test
        working-directory: frontend

  # JOB 4: Security audit
  security-audit:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm install
        working-directory: backend
      - run: npm audit --audit-level=high
        working-directory: backend
